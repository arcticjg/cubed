<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cubed — Build Log</title>
<script>
  (function () {
    try {
      var raw = localStorage.getItem("cube-project-v1");
      var s = raw ? JSON.parse(raw) : null;
      var dark = s ? s.theme === "dark" : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      if (dark) document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --ink: #0b1020;
    --ink-soft: #3a4166;
    --ink-faint: #8890b4;
    --base: #eef1f7;
    --glass: rgba(255, 255, 255, 0.42);
    --glass-strong: rgba(255, 255, 255, 0.62);
    --glass-line: rgba(255, 255, 255, 0.7);
    --iris: linear-gradient(115deg, #7fb0ff 0%, #9e8cff 32%, #e9a6ff 60%, #8fe3d8 100%);
    --shadow: 0 20px 50px -20px rgba(40, 50, 110, 0.35);
    --radius: 22px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    --line-08: rgba(11,16,32,0.08);
    --line-12: rgba(11,16,32,0.12);
    --line-14: rgba(11,16,32,0.14);
    --line-16: rgba(11,16,32,0.16);
    --line-25: rgba(11,16,32,0.25);
    --line-28: rgba(11,16,32,0.28);
    --line-hover: rgba(11,16,32,0.3);
    --line-focus: rgba(11,16,32,0.4);
    --scrim-60: rgba(11,16,32,0.6);
    --scrim-90: rgba(11,16,32,0.9);
    --w-35: rgba(255,255,255,0.35);
    --w-40: rgba(255,255,255,0.4);
    --w-50: rgba(255,255,255,0.5);
    --w-70: rgba(255,255,255,0.7);
    --w-80: rgba(255,255,255,0.8);
    --modal-scrim: rgba(20,26,54,0.28);
    --light-scrim: rgba(16,20,44,0.55);
    --solid: #0b1020;
    --solid-fg: #ffffff;
  }

  [data-theme="dark"] {
    --ink: #eef1f7;
    --ink-soft: #b7bde0;
    --ink-faint: #6d759e;
    --base: #0a0d1a;
    --glass: rgba(28, 32, 58, 0.55);
    --glass-strong: rgba(40, 45, 78, 0.68);
    --glass-line: rgba(255, 255, 255, 0.09);
    --shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.65);
    --line-08: rgba(255,255,255,0.08);
    --line-12: rgba(255,255,255,0.12);
    --line-14: rgba(255,255,255,0.14);
    --line-16: rgba(255,255,255,0.16);
    --line-25: rgba(255,255,255,0.22);
    --line-28: rgba(255,255,255,0.26);
    --line-hover: rgba(255,255,255,0.32);
    --line-focus: rgba(255,255,255,0.42);
    --w-35: rgba(255,255,255,0.06);
    --w-40: rgba(255,255,255,0.07);
    --w-50: rgba(255,255,255,0.09);
    --w-70: rgba(255,255,255,0.12);
    --w-80: rgba(255,255,255,0.16);
    --modal-scrim: rgba(3,5,14,0.55);
    --light-scrim: rgba(3,5,14,0.7);
    --solid: #eef1f7;
    --solid-fg: #0b1020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--base);
    position: relative; overflow-x: hidden; min-height: 100vh; -webkit-font-smoothing: antialiased;
    transition: background-color .25s ease, color .25s ease;
  }

  .field { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.55; mix-blend-mode: multiply; animation: drift 22s ease-in-out infinite; }
  .orb.a { width: 46vw; height: 46vw; left: -8vw; top: -10vw; background: radial-gradient(circle at 30% 30%, #a9c4ff, transparent 70%); }
  .orb.b { width: 40vw; height: 40vw; right: -6vw; top: 8vh; background: radial-gradient(circle at 60% 40%, #e6b6ff, transparent 70%); animation-delay: -6s; }
  .orb.c { width: 44vw; height: 44vw; left: 22vw; bottom: -16vw; background: radial-gradient(circle at 50% 50%, #a6f0e6, transparent 70%); animation-delay: -12s; }
  .orb.d { width: 30vw; height: 30vw; right: 14vw; bottom: -6vw; background: radial-gradient(circle at 50% 50%, #c3b8ff, transparent 70%); animation-delay: -3s; }
  @keyframes drift { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(4vw,3vh) scale(1.08);} 66%{transform:translate(-3vw,-2vh) scale(0.96);} }
  [data-theme="dark"] .orb { mix-blend-mode: screen; opacity: 0.3; }

  .wrap { position: relative; z-index: 1; max-width: 940px; margin: 0 auto; padding: 34px 20px 90px; }

  .glass {
    background: var(--glass);
    backdrop-filter: blur(26px) saturate(180%); -webkit-backdrop-filter: blur(26px) saturate(180%);
    border: 1px solid var(--glass-line); border-radius: var(--radius);
    box-shadow: var(--shadow), inset 0 1px 1px var(--w-70);
  }

  /* HEADER */
  .slab { position: relative; padding: 26px 28px; overflow: hidden; }
  .slab::before { content:""; position:absolute; inset:0; background: var(--iris); opacity:.14; mix-blend-mode:screen; pointer-events:none; }
  .slab-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .brand { display: flex; gap: 16px; align-items: flex-start; }
  .logo { width: 54px; height: 54px; flex: none; margin-top: 3px; filter: drop-shadow(0 6px 12px rgba(40,50,110,.28)); }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
  .title { font-size: clamp(28px, 5.5vw, 44px); font-weight: 700; letter-spacing: -0.02em; line-height: 1; outline: none; border-radius: 6px; padding: 2px 4px; margin-left: -4px; transition: background .2s; }
  .title:focus { background: var(--w-50); }
  .subtitle { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); margin-top: 10px; letter-spacing: 0.02em; }

  .rank-box { display: flex; align-items: center; gap: 16px; }
  .ring { position: relative; width: 84px; height: 84px; flex: none; }
  .ring svg { transform: rotate(-90deg); }
  .ring-track { stroke: var(--line-08); }
  .ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 17px; font-weight: 600; }
  .rank-meta { text-align: right; }
  .rank-name { font-family: var(--mono); font-size: 15px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
  .rank-lvl { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; }

  .xp-bar { margin-top: 22px; }
  .xp-track { height: 8px; border-radius: 20px; background: var(--line-08); overflow: hidden; }
  .xp-fill { height: 100%; border-radius: 20px; background: var(--iris); background-size: 200% 100%; animation: shimmer 4s linear infinite; transition: width .8s cubic-bezier(.2,.8,.2,1); }
  @keyframes shimmer { to { background-position: 200% 0; } }
  .xp-legend { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.08em; margin-top: 7px; }

  .readout { margin-top: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line-08); border-radius: 14px; overflow: hidden; }
  .readout .cell { background: var(--glass-strong); padding: 13px 14px; }
  .readout .k { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .readout .v { font-family: var(--mono); font-size: 21px; font-weight: 600; margin-top: 5px; letter-spacing: -0.01em; }
  @media (max-width: 640px){ .readout { grid-template-columns: repeat(2, 1fr); } }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin: 24px 0 18px; padding: 6px; width: fit-content; }
  .tab { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; padding: 9px 18px; border-radius: 14px; border: none; cursor: pointer; color: var(--ink-soft); background: transparent; transition: all .2s; }
  .tab:hover { color: var(--ink); }
  .tab.on { background: var(--glass-strong); color: var(--ink); box-shadow: 0 4px 14px -6px rgba(40,50,110,.4), inset 0 1px 1px var(--w-80); }
  .tab .count { color: var(--ink-faint); margin-left: 6px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; padding: 6px 13px; border-radius: 20px; cursor: pointer; border: 1px solid var(--line-12); background: var(--w-40); color: var(--ink-soft); transition: all .18s; }
  .chip:hover { border-color: var(--line-hover); }
  .chip.on { background: var(--solid); color: var(--solid-fg); border-color: var(--solid); }

  /* BOUNTIES */
  .list { display: flex; flex-direction: column; gap: 12px; }
  .bounty { position: relative; overflow: hidden; padding: 0; transition: box-shadow .25s; }
  .bounty:hover { box-shadow: 0 26px 55px -22px rgba(40,50,110,.45), inset 0 1px 1px var(--w-70); }
  .bounty .sweep { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 3; background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.85) 46%, rgba(180,220,255,.6) 52%, rgba(233,166,255,.5) 58%, transparent 74%); transform: translateX(-30%); }
  .bounty.claimed-anim .sweep { animation: refract 1s ease-out forwards; }
  @keyframes refract { 0%{opacity:1; transform:translateX(-40%);} 100%{opacity:0; transform:translateX(60%);} }

  .b-main { display: flex; align-items: center; gap: 16px; padding: 18px 20px; cursor: pointer; }
  .b-body { flex: 1; min-width: 0; }
  .b-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
  .cat { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; color: #fff; font-weight: 600; }
  .diff { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; }
  .diff b { color: var(--ink-soft); }
  .mb { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); border: 1px solid var(--line-14); padding: 2px 6px; border-radius: 6px; }
  .b-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .b-title[contenteditable], .txt-content[contenteditable] { cursor: text; border-radius: 6px; padding: 1px 4px; margin: -1px -4px; }
  .b-title[contenteditable]:focus, .txt-content[contenteditable]:focus { background: var(--w-50); outline: none; }
  .b-desc { font-size: 13px; color: var(--ink-soft); margin-top: 4px; line-height: 1.45; }

  .b-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex: none; }
  .reward { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.02em; background: var(--iris); -webkit-background-clip: text; background-clip: text; color: transparent; white-space: nowrap; }
  .reward.done-r { background: none; color: var(--ink-faint); -webkit-text-fill-color: var(--ink-faint); }
  .claim { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 9px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; border: 1px solid var(--solid); background: var(--solid); color: var(--solid-fg); transition: transform .18s; white-space: nowrap; }
  .claim:hover { transform: scale(1.04); } .claim:active { transform: scale(0.96); }
  .undo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 9px 14px; border-radius: 12px; cursor: pointer; border: 1px solid var(--line-25); background: transparent; color: var(--ink-soft); transition: all .16s; white-space: nowrap; }
  .undo:hover { border-color: var(--ink); color: var(--ink); }

  .bounty.done .b-title { text-decoration: line-through; text-decoration-color: var(--ink-faint); color: var(--ink-soft); }
  .b-del { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 18px; line-height: 1; padding: 4px; opacity: 0; transition: opacity .2s; flex: none; }
  .bounty:hover .b-del { opacity: 1; }
  .b-del:hover { color: #e0709a; }
  .caret { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); flex: none; transition: transform .2s; }
  .caret.up { transform: rotate(90deg); }

  /* DETAIL PANEL */
  .detail { padding: 2px 20px 20px; border-top: 1px solid var(--line-08); animation: slideIn .25s ease; }
  @keyframes slideIn { from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;} }
  .d-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin: 16px 0 8px; }
  .hint { text-transform: none; letter-spacing: 0.02em; font-weight: 400; opacity: .7; }
  .detail.drag-over { outline: 2px dashed var(--line-focus); outline-offset: -8px; border-radius: 14px; }
  .thumbs { display: flex; flex-wrap: wrap; gap: 10px; }
  .thumb { position: relative; width: 78px; height: 78px; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-line); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }
  .thumb-x { position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer; background: var(--scrim-60); color: #fff; font-size: 12px; line-height: 1; }
  .add-img { width: 78px; height: 78px; border-radius: 12px; border: 1px dashed var(--line-28); background: var(--w-35); cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--ink-soft); transition: all .16s; }
  .add-img:hover { border-color: var(--ink); color: var(--ink); }
  .comments { display: flex; flex-direction: column; gap: 8px; }
  .comment { padding: 10px 14px; border-radius: 12px; background: var(--w-40); border: 1px solid var(--w-50); }
  .c-txt { font-size: 13.5px; line-height: 1.45; word-wrap: break-word; }
  .c-txt[contenteditable] { cursor: text; border-radius: 6px; }
  .c-txt[contenteditable]:focus { background: var(--w-50); outline: none; }
  .c-when { font-family: var(--mono); font-size: 9.5px; color: var(--ink-faint); letter-spacing: 0.08em; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
  .c-del { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 13px; line-height: 1; padding: 2px 4px; opacity: 0; transition: opacity .2s; }
  .comment:hover .c-del { opacity: 1; }
  .c-del:hover { color: #e0709a; }
  .c-empty { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.06em; }
  .detail .add-row { margin-top: 10px; }

  .divider { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin: 26px 2px 12px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px; }
  .divider::after { content: ""; flex: 1; height: 1px; background: var(--line-08); }

  .add-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .inp { flex: 1; min-width: 200px; font-family: var(--sans); font-size: 14px; color: var(--ink); padding: 12px 16px; border-radius: 14px; border: 1px solid var(--line-14); background: var(--w-50); outline: none; transition: border .2s; }
  .inp:focus { border-color: var(--line-focus); }
  .inp::placeholder { color: var(--ink-faint); }
  .sel { font-family: var(--mono); font-size: 12px; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--line-14); background: var(--w-50); color: var(--ink-soft); outline: none; cursor: pointer; }
  .btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; border: 1px solid var(--solid); background: var(--solid); color: var(--solid-fg); transition: transform .15s; }
  .btn:hover { transform: scale(1.03); }

  /* IDEAS */
  .ideas { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .idea { padding: 0; overflow: hidden; }
  .i-main { padding: 15px 18px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; }
  .idea .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--iris); margin-top: 6px; flex: none; }
  .idea .txt { flex: 1; font-size: 14.5px; line-height: 1.5; min-width: 0; word-wrap: break-word; }
  .idea .when { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; margin-top: 5px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .idea-acts { display: flex; gap: 6px; flex: none; opacity: 0; transition: opacity .2s; }
  .idea:hover .idea-acts { opacity: 1; }
  .idea .caret { margin-top: 4px; }
  .mini { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; border-radius: 10px; cursor: pointer; border: 1px solid var(--line-16); background: var(--w-40); color: var(--ink-soft); transition: all .16s; }
  .mini:hover { border-color: var(--ink); color: var(--ink); }

  /* ROADMAP */
  .phases { display: flex; flex-direction: column; gap: 14px; }
  .phase { padding: 20px 22px; position: relative; overflow: hidden; }
  .phase.current::after { content: "CURRENT"; position: absolute; top: 18px; right: 20px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--solid-fg); background: var(--solid); padding: 4px 9px; border-radius: 20px; }
  .phase-idx { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.14em; }
  .phase-name { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; margin: 6px 0 14px; }
  .p-track { height: 6px; border-radius: 20px; background: var(--line-08); overflow: hidden; }
  .p-fill { height: 100%; border-radius: 20px; background: var(--iris); transition: width .8s cubic-bezier(.2,.8,.2,1); }
  .p-legend { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 8px; letter-spacing: 0.06em; }

  .empty { font-family: var(--mono); font-size: 12.5px; color: var(--ink-faint); text-align: center; padding: 40px 20px; letter-spacing: 0.04em; }

  /* FX */
  .fx-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
  .xp-pop { position: absolute; font-family: var(--mono); font-weight: 700; font-size: 20px; background: var(--iris); -webkit-background-clip: text; background-clip: text; color: transparent; animation: xpUp 1.1s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes xpUp { 0%{opacity:0; transform:translateY(6px) scale(.8);} 20%{opacity:1;} 100%{opacity:0; transform:translateY(-46px) scale(1.1);} }
  .particle { position: absolute; width: 7px; height: 7px; border-radius: 50%; animation: burst .8s ease-out forwards; }
  @keyframes burst { 0%{opacity:1; transform:translate(0,0) scale(1);} 100%{opacity:0; transform:translate(var(--dx),var(--dy)) scale(0);} }

  .modal-bg { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; background: var(--modal-scrim); backdrop-filter: blur(10px); animation: fade .3s ease; }
  .modal-bg.show { display: flex; }
  @keyframes fade { from{opacity:0;} to{opacity:1;} }
  .modal { text-align: center; padding: 44px 40px; max-width: 380px; position: relative; overflow: hidden; animation: pop .5s cubic-bezier(.2,1.2,.4,1); }
  @keyframes pop { from{opacity:0; transform:scale(.85) translateY(12px);} to{opacity:1; transform:none;} }
  .modal::before { content:""; position:absolute; inset:0; background: var(--iris); opacity:.18; mix-blend-mode:screen; }
  .modal .lu { font-family: var(--mono); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); }
  .modal .newrank { font-size: 40px; font-weight: 800; letter-spacing: -0.02em; margin: 10px 0 6px; background: var(--iris); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .modal .lu-sub { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); margin-bottom: 22px; letter-spacing: 0.04em; }

  .light-bg { position: fixed; inset: 0; z-index: 120; display: none; align-items: center; justify-content: center; padding: 24px; background: var(--light-scrim); backdrop-filter: blur(12px); }
  .light-bg.show { display: flex; }
  .light-bg img { max-width: 92%; max-height: 88%; border-radius: 16px; box-shadow: 0 30px 80px -20px rgba(0,0,0,.5); }

  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 130; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; color: #fff; background: var(--scrim-90); padding: 12px 18px; border-radius: 12px; animation: tst 3.4s ease forwards; }
  @keyframes tst { 0%{opacity:0; transform:translate(-50%,8px);} 10%,80%{opacity:1; transform:translate(-50%,0);} 100%{opacity:0;} }

  .foot { text-align: center; margin-top: 40px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.14em; }
  .sound-toggle { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; }
  .sound-toggle:hover { color: var(--ink); }

<script>
(function () {
  "use strict";

  var FIREBASE_CONFIG = {
    apiKey: "AIzaSyBHPItqWVU1Q7NgnTdF6IkNszDv0dnpI3A",
    authDomain: "cubed-a71da.firebaseapp.com",
    projectId: "cubed-a71da",

  var RANKS = [

    { name: "MIXTAPE", at: 600 }, { name: "ALBUM", at: 1000 }, { name: "GOLD", at: 1600 },

  var DIFF = { Easy: 50, Medium: 100, Hard: 200, Epic: 350 };

  function seedTasks() {
    var t = [
      ["Source NOR flash chip options (128MB–1GB)", "Small soldered chip, no card slot. A compressed album fits well under 100MB.", 0, "HARDWARE", "Medium"],
      ["Source a contact / pogo-pin connector", "The cube-to-player interface — think Game Boy cartridge edge, shrunk down.", 0, "HARDWARE", "Medium"],
      ["Wire flash chip to an ESP32 / Arduino", "First real breadboard test of the read path.", 0, "HARDWARE", "Hard"],
      ["Read a folder of MP3s off the chip reliably", "The make-or-break moment. Nail this before anything else gets designed.", 0, "FIRMWARE", "Epic"],
      ["Choose a DAC / amp + headphone jack", "Audio output path for the player unit.", 1, "HARDWARE", "Medium"],
      ["Wire the player: ESP32 + DAC + battery + reader slot", "Full breadboard player around the working reader.", 1, "HARDWARE", "Hard"],
      ["Firmware: mount cube storage + play audio", "Detect insertion, mount the chip, stream the files.", 1, "FIRMWARE", "Hard"],
      ["Playback controls: play / pause / skip / volume", "Minimum viable interaction.", 1, "FIRMWARE", "Medium"],
      ["Design cube shell around chip + connector", "Real dimensions first, aesthetics second.", 2, "DESIGN", "Hard"],
      ["Prototype the personalisation layer", "Printed art tiles or a window insert before any electronic screen.", 2, "DESIGN", "Medium"],
      ["3D-print + test-fit cube prototypes", "Confirm the connector seats cleanly every time.", 2, "DESIGN", "Medium"],
      ["Decide content model: blank vs official cubes", "Personal-use blanks vs licensed tradeable releases.", 3, "BUSINESS", "Medium"],
      ["Design locked vs writable flash split", "Official = read-only pressing; blank = writable. Protects the model.", 3, "HARDWARE", "Hard"],
      ["Line up 3 indie / unsigned artists for first cubes", "Easiest 'yes' for licensed content while small.", 3, "CONTENT", "Hard"],
      ["Get legal advice on pressing / licensing", "Before selling anything with commercial music. Not optional.", 3, "LEGAL", "Epic"],
      ["Name the project + lock a brand identity", "The glass-and-gradient world these images point at.", 4, "BRAND", "Medium"],
      ["Build a crowdfunder page (Kickstarter / Crowd Supply)", "Fund the first real manufacturing run.", 4, "BUSINESS", "Hard"],
      ["Design the trading / social mechanic", "Collect, show off, trade — the first-sale-doctrine layer.", 4, "BRAND", "Medium"]
    ];
    return t.map(function (r, i) {
      return { id: "t" + i, title: r[0], desc: r[1], phase: r[2], cat: r[3], diff: r[4], done: false, at: null, comments: [], images: [] };
    });
  }
  function seedIdeas() {
    return [
      { id: "i0", txt: "E-ink premium tier — holds album art with zero power draw.", at: Date.now(), comments: [], images: [] },
      { id: "i1", txt: "Frame official cubes as limited artist drops: merch that actually plays.", at: Date.now(), comments: [], images: [] },
      { id: "i2", txt: "Trading rides on first-sale doctrine — legal, like swapping used records.", at: Date.now(), comments: [], images: [] }
    ];
  }

  var KEY = "cube-project-v1", mem = null, state = null;
  var currentView = "bounties", filter = "all", soundOn = true, theme = "light";
  var openIds = {}, showClaimed = false, lastActiveItem = null;

  function defaults() { return { name: "VOLUME", xp: 0, tasks: seedTasks(), ideas: seedIdeas(), sound: true, theme: (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light" }; }

  function normalize() {
    state.tasks.forEach(function (t) { if (!t.comments) t.comments = []; if (!t.images) t.images = []; });
    state.ideas.forEach(function (i) { if (!i.comments) i.comments = []; if (!i.images) i.images = []; });
    if (typeof state.sound === "boolean") soundOn = state.sound;
    theme = state.theme === "dark" ? "dark" : "light";
    applyTheme();
  }

  async function load() {
    try {
      if (window.storage) { var res = await window.storage.get(KEY); if (res && res.value) state = JSON.parse(res.value); }
      else { var ls = localStorage.getItem(KEY); if (ls) state = JSON.parse(ls); }
    } catch (e) {}
    if (!state) { state = defaults(); }
    normalize();
    if (fbDoc) {
      try {
        var snap = await fbDoc.get();
        if (snap.exists) { state = snap.data(); normalize(); }
        else { await fbDoc.set(state); }
      } catch (e) { toast("Offline — using the local copy on this device."); }
      fbDoc.onSnapshot(function (snap) {
        if (snap.metadata.hasPendingWrites || !snap.exists) return;
        state = snap.data(); normalize();
        var ae = document.activeElement;
        if (ae && (ae.isContentEditable || ae.tagName === "INPUT" || ae.tagName === "SELECT")) return;
        render();
      });
    }
    await save();
  }

  async function save() {
    state.sound = soundOn;
    state.theme = theme;
    var str = JSON.stringify(state);
    try {
      if (window.storage) { var r = await window.storage.set(KEY, str); if (r === null) toast("Couldn't save — image may be too large."); }
      else localStorage.setItem(KEY, str);
    } catch (e) { toast("Storage full — try a smaller image, or export a backup."); mem = str; }
    if (fbDoc) {
      try { await fbDoc.set(state); }
      catch (e) { toast("Couldn't sync to the cloud — check your connection."); }
    }
  }

  function rankFor(xp) { var idx = 0; for (var i = 0; i < RANKS.length; i++) if (xp >= RANKS[i].at) idx = i; return idx; }
  function nextThreshold(xp) { var idx = rankFor(xp); return idx < RANKS.length - 1 ? RANKS[idx + 1].at : RANKS[idx].at; }

  var actx = null;
  function beep(seq) {
    if (!soundOn) return;
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      var t0 = actx.currentTime;
      seq.forEach(function (n, i) {
        var o = actx.createOscillator(), g = actx.createGain(), s = t0 + i * n.gap;
        o.type = "sine"; o.frequency.value = n.f;
        g.gain.setValueAtTime(0, s); g.gain.linearRampToValueAtTime(n.v || 0.14, s + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, s + (n.d || 0.28));
        o.connect(g); g.connect(actx.destination); o.start(s); o.stop(s + (n.d || 0.28) + 0.02);
      });
    } catch (e) {}
  }
  function chime() { beep([{ f: 660, gap: 0.08 }, { f: 880, gap: 0.08 }, { f: 1174, gap: 0.08, d: 0.4 }]); }
  function fanfare() { beep([{ f: 523, gap: 0.11 }, { f: 659, gap: 0.11 }, { f: 784, gap: 0.11 }, { f: 1047, gap: 0.11, d: 0.6, v: 0.16 }]); }

  function fxAt(x, y, label) {
    var fx = document.getElementById("fx");
    var pop = document.createElement("div");
    pop.className = "xp-pop"; pop.textContent = label; pop.style.left = x + "px"; pop.style.top = y + "px";
    fx.appendChild(pop); setTimeout(function () { pop.remove(); }, 1150);
    var cols = ["#7fb0ff", "#9e8cff", "#e9a6ff", "#8fe3d8", "#c3b8ff"];
    for (var i = 0; i < 14; i++) {
      var p = document.createElement("div"); p.className = "particle";
      p.style.left = x + "px"; p.style.top = (y + 8) + "px"; p.style.background = cols[i % cols.length];
      var ang = (Math.PI * 2 * i) / 14, dist = 40 + Math.random() * 50;
      p.style.setProperty("--dx", Math.cos(ang) * dist + "px");
      p.style.setProperty("--dy", (Math.sin(ang) * dist - 10) + "px");
      fx.appendChild(p);
      (function (el) { setTimeout(function () { el.remove(); }, 820); })(p);
    }
  }

  var toastTimer = null;
  function toast(msg) {
    var ex = document.querySelector(".toast"); if (ex) ex.remove();
    var el = document.createElement("div"); el.className = "toast"; el.textContent = msg;
    document.body.appendChild(el);
    clearTimeout(toastTimer); toastTimer = setTimeout(function () { el.remove(); }, 3400);
  }

  function getColl(kind) { return kind === "idea" ? state.ideas : state.tasks; }
  function getItem(kind, id) { return getColl(kind).find(function (x) { return x.id === id; }); }

  function stats() {
    var done = state.tasks.filter(function (t) { return t.done; }).length, total = state.tasks.length, curPhase = 0;
    for (var p = 0; p < PHASES.length; p++) {
      var pt = state.tasks.filter(function (t) { return t.phase === p; });
      var pd = pt.filter(function (t) { return t.done; }).length;
      if (pt.length && pd < pt.length) { curPhase = p; break; }
      if (p === PHASES.length - 1) curPhase = p;
    }
    return { done: done, total: total, pct: total ? Math.round(done / total * 100) : 0, curPhase: curPhase };
  }

  function renderHeader() {
    var s = stats();
    document.getElementById("projTitle").textContent = state.name;
    var ri = rankFor(state.xp);
    document.getElementById("rankName").textContent = RANKS[ri].name;
    document.getElementById("rankLvl").textContent = "LVL " + (ri + 1);
    var r = 37, circ = 2 * Math.PI * r, rf = document.getElementById("ringFill");
    rf.style.strokeDasharray = circ; rf.style.strokeDashoffset = circ * (1 - s.pct / 100);
    rf.style.transition = "stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)";
    document.getElementById("ringPct").textContent = s.pct + "%";
    var base = RANKS[ri].at, next = nextThreshold(state.xp), span = (next - base) || 1, into = state.xp - base;
    var pctxp = ri < RANKS.length - 1 ? Math.min(100, Math.round(into / span * 100)) : 100;
    document.getElementById("xpFill").style.width = pctxp + "%";
    document.getElementById("xpNow").textContent = state.xp + " XP";
    document.getElementById("xpNext").textContent = ri < RANKS.length - 1 ? ("NEXT: " + next + " XP") : "MAX RANK";
    var read = [["Bounties", s.done + " / " + s.total], ["Momentum", s.pct + "%"], ["Phase", "0" + (s.curPhase + 1) + " / 0" + PHASES.length], ["Ideas", "" + state.ideas.length]];
    document.getElementById("readout").innerHTML = read.map(function (c) { return '<div class="cell"><div class="k">' + c[0] + '</div><div class="v">' + c[1] + '</div></div>'; }).join("");
    document.getElementById("cBounties").textContent = " " + (s.total - s.done);
    document.getElementById("cIdeas").textContent = " " + state.ideas.length;
  }

  function catTag(cat) { return '<span class="cat" style="background:' + (CATS[cat] || "#666") + '">' + cat + '</span>'; }
  function metaBadges(item) {
    var c = (item.comments || []).length, im = (item.images || []).length, out = "";
    if (im) out += '<span class="mb">' + im + ' img</span>';
    if (c) out += '<span class="mb">' + c + ' note' + (c > 1 ? "s" : "") + '</span>';
    return out;
  }

  function detailHtml(kind, item) {
    var d = kind + ":" + item.id;
    var imgs = (item.images || []).map(function (src, ix) {
      return '<div class="thumb"><img src="' + src + '" data-view-img="' + kind + ":" + item.id + ":" + ix + '"/>' +
        '<button class="thumb-x" data-del-img="' + kind + ":" + item.id + ":" + ix + '">×</button></div>';
    }).join("");

    return '<div class="detail" data-item="' + d + '">' +

      '<div class="d-label">Images <span class="hint">drop, paste, or pick — any amount</span></div><div class="thumbs">' + imgs +
      '<button class="add-img" data-img="' + d + '">+ Image</button></div>' +

      '<button class="btn cadd" data-c="' + d + '">Add</button></div></div>';
  }

  function bountyCard(t) {
    var xp = DIFF[t.diff] || 100, open = !!openIds[t.id];
    var right = t.done
      ? '<div class="reward done-r">✓ Claimed</div><button class="undo" data-undo="' + t.id + '">Undo</button>'
      : '<div class="reward">+' + xp + ' XP</div><button class="claim" data-id="' + t.id + '">Claim</button>';
    return '<div class="glass bounty' + (t.done ? " done" : "") + '" id="card_' + t.id + '"><div class="sweep"></div>' +
      '<div class="b-main" data-toggle="' + t.id + '">' +
      '<div class="b-body"><div class="b-tags">' + catTag(t.cat) +
      '<span class="diff"><b>' + t.diff + '</b> · ' + PHASES[t.phase] + '</span>' + metaBadges(t) + '</div>' +
      '<div class="b-title" contenteditable="true" spellcheck="false" data-edit-title="task:' + t.id + '">' + esc(t.title) + '</div></div>' +
      '<div class="b-right">' + right + '</div>' +
      '<button class="b-del" data-del-task="' + t.id + '" title="Delete">×</button>' +
      '<span class="caret' + (open ? " up" : "") + '">▸</span></div>' +
      (open ? detailHtml("task", t) : "") + '</div>';

  function renderBounties() {
    var el = document.getElementById("view");
    var active = state.tasks.filter(function (t) { return !t.done; });
    var claimed = state.tasks.filter(function (t) { return t.done; });

      PHASES.map(function (p, i) { return '<span class="chip' + (filter === "" + i ? " on" : "") + '" data-f="' + i + '">' + p + '</span>'; }).join("") + '</div>';

    var listHtml = active.length ? active.map(bountyCard).join("") : '<div class="glass empty">No open bounties here. Log one below or switch filters.</div>';
    var claimedHtml = "";
    if (claimed.length) {
      claimedHtml = '<div class="divider" id="toggleClaimed">' + (showClaimed ? "▾" : "▸") + ' Claimed · ' + claimed.length + '</div>' +
        (showClaimed ? '<div class="list">' + claimed.map(bountyCard).join("") + '</div>' : "");
    }
    var addHtml = '<div class="glass slab" style="padding:18px 20px; margin-top:20px"><div class="eyebrow">Log a bounty</div>' +
      '<div class="add-row"><input class="inp" id="ntTitle" placeholder="What needs doing?" />' +
      '<select class="sel" id="ntPhase">' + PHASES.map(function (p, i) { return '<option value="' + i + '">' + p + '</option>'; }).join("") + '</select>' +
      '<select class="sel" id="ntCat">' + Object.keys(CATS).map(function (c) { return '<option>' + c + '</option>'; }).join("") + '</select>' +
      '<select class="sel" id="ntDiff">' + Object.keys(DIFF).map(function (dd) { return '<option>' + dd + ' · ' + DIFF[dd] + 'xp</option>'; }).join("") + '</select>' +
      '<button class="btn" id="ntAdd">Add</button></div></div>';

    el.innerHTML = chips + '<div class="list">' + listHtml + '</div>' + claimedHtml + addHtml;

    el.querySelectorAll(".chip").forEach(function (c) { c.onclick = function () { filter = c.getAttribute("data-f"); renderBounties(); }; });
    el.querySelectorAll(".claim").forEach(function (b) { b.onclick = function (e) { e.stopPropagation(); claim(b.getAttribute("data-id"), e); }; });

    var tg = document.getElementById("toggleClaimed"); if (tg) tg.onclick = function () { showClaimed = !showClaimed; renderBounties(); };
    var addBtn = document.getElementById("ntAdd");
    if (addBtn) { addBtn.onclick = addTask; document.getElementById("ntTitle").addEventListener("keydown", function (e) { if (e.key === "Enter") addTask(); }); }
    wireDetails(el);
  }

  function ideaCard(i) {
    var open = !!openIds[i.id];
    return '<div class="glass idea" id="idea_' + i.id + '">' +
      '<div class="i-main" data-toggle="' + i.id + '"><div class="dot"></div>' +
      '<div class="txt"><div class="txt-content" contenteditable="true" spellcheck="false" data-edit-title="idea:' + i.id + '">' + esc(i.txt) + '</div><div class="when">' + timeAgo(i.at) + ' ' + metaBadges(i) + '</div></div>' +
      '<div class="idea-acts"><button class="mini" data-promote="' + i.id + '">→ Bounty</button>' +
      '<button class="mini" data-del-idea="' + i.id + '">Delete</button></div>' +
      '<span class="caret' + (open ? " up" : "") + '">▸</span></div>' +
      (open ? detailHtml("idea", i) : "") + '</div>';
  }

  function renderIdeas() {
    var el = document.getElementById("view");
    var add = '<div class="glass slab" style="padding:18px 20px"><div class="eyebrow">Capture</div>' +
      '<div class="add-row"><input class="inp" id="ideaInp" placeholder="Drop a raw idea — no pressure to organise it" />' +
      '<button class="btn" id="ideaAdd">Log</button></div></div>';
    var ideas = state.ideas.length ? '<div class="ideas">' + state.ideas.slice().reverse().map(ideaCard).join("") + '</div>' :
      '<div class="glass empty">No ideas logged yet. This is your scratchpad — anything goes.</div>';
    el.innerHTML = add + '<div style="height:16px"></div>' + ideas;
    document.getElementById("ideaAdd").onclick = addIdea;
    document.getElementById("ideaInp").addEventListener("keydown", function (e) { if (e.key === "Enter") addIdea(); });
    el.querySelectorAll("[data-promote]").forEach(function (b) { b.onclick = function (e) { e.stopPropagation(); promote(b.getAttribute("data-promote")); }; });
    el.querySelectorAll("[data-del-idea]").forEach(function (b) { b.onclick = function (e) { e.stopPropagation(); state.ideas = state.ideas.filter(function (x) { return x.id !== b.getAttribute("data-del-idea"); }); save(); renderIdeas(); renderHeader(); }; });
    wireDetails(el);
  }

  function wireDetails(el) {
    el.querySelectorAll("[data-toggle]").forEach(function (m) {
      m.onclick = function (e) { if (e.target.closest("button") || e.target.closest("[contenteditable]")) return; var id = m.getAttribute("data-toggle"); if (openIds[id]) delete openIds[id]; else openIds[id] = true; render(); };
    });
    el.querySelectorAll("[data-edit-title]").forEach(function (elx) {
      elx.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); elx.blur(); } });
      elx.addEventListener("blur", function () {
        var p = elx.getAttribute("data-edit-title").split(":");
        var it = getItem(p[0], p[1]); if (!it) return;
        var v = elx.textContent.trim();
        if (!v) { elx.textContent = p[0] === "idea" ? it.txt : it.title; return; }
        if (p[0] === "idea") it.txt = v; else it.title = v;
        save();
      });
    });
    el.querySelectorAll("[data-edit-c]").forEach(function (c) {
      c.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); c.blur(); } });
      c.addEventListener("blur", function () {
        var p = c.getAttribute("data-edit-c").split(":");
        var it = getItem(p[0], p[1]); if (!it || !it.comments || !it.comments[+p[2]]) return;
        var v = c.textContent.trim();
        if (!v) { c.textContent = it.comments[+p[2]].txt; return; }
        it.comments[+p[2]].txt = v; save();
      });
    });
    el.querySelectorAll("[data-del-c]").forEach(function (b) {
      b.onclick = function (e) { e.stopPropagation(); var p = b.getAttribute("data-del-c").split(":"); var it = getItem(p[0], p[1]); if (it && it.comments) { it.comments.splice(+p[2], 1); save(); render(); } };
    });
    el.querySelectorAll(".add-img").forEach(function (b) {
      b.onclick = function (e) { e.stopPropagation(); window._imgTarget = b.getAttribute("data-img"); document.getElementById("filePick").click(); };
    });
    el.querySelectorAll(".detail").forEach(function (d) {
      lastActiveItem = d.getAttribute("data-item");
      d.addEventListener("focusin", function () { lastActiveItem = d.getAttribute("data-item"); });
      d.addEventListener("click", function () { lastActiveItem = d.getAttribute("data-item"); });
      d.addEventListener("dragover", function (e) { e.preventDefault(); d.classList.add("drag-over"); });
      d.addEventListener("dragleave", function () { d.classList.remove("drag-over"); });
      d.addEventListener("drop", function (e) {
        e.preventDefault(); d.classList.remove("drag-over");
        var files = e.dataTransfer && e.dataTransfer.files ? Array.prototype.slice.call(e.dataTransfer.files) : [];
        attachImages(d.getAttribute("data-item"), files);
      });
    });
    el.querySelectorAll("[data-del-img]").forEach(function (b) {
      b.onclick = function (e) { e.stopPropagation(); var p = b.getAttribute("data-del-img").split(":"); var it = getItem(p[0], p[1]); if (it) { it.images.splice(+p[2], 1); save(); render(); } };
    });
    el.querySelectorAll("[data-view-img]").forEach(function (t) {
      t.onclick = function (e) { e.stopPropagation(); var p = t.getAttribute("data-view-img").split(":"); var it = getItem(p[0], p[1]); if (it) showLight(it.images[+p[2]]); };
    });
    el.querySelectorAll(".cadd").forEach(function (b) {
      b.onclick = function (e) { e.stopPropagation(); var d = b.getAttribute("data-c"); var inp = el.querySelector('input.cinp[data-c="' + d + '"]'); var p = d.split(":"); addComment(p[0], p[1], inp ? inp.value : ""); };
    });
    el.querySelectorAll(".cinp").forEach(function (inp) {
      inp.addEventListener("keydown", function (e) { if (e.key === "Enter") { var p = inp.getAttribute("data-c").split(":"); addComment(p[0], p[1], inp.value); } });
    });
  }

  function renderRoadmap() {
    var el = document.getElementById("view"), s = stats();
    el.innerHTML = '<div class="phases">' + PHASES.map(function (p, i) {
      var pt = state.tasks.filter(function (t) { return t.phase === i; });
      var pd = pt.filter(function (t) { return t.done; }).length, pct = pt.length ? Math.round(pd / pt.length * 100) : 0;
      return '<div class="glass phase' + (i === s.curPhase ? " current" : "") + '"><div class="phase-idx">PHASE 0' + (i + 1) + '</div>' +
        '<div class="phase-name">' + p + '</div><div class="p-track"><div class="p-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="p-legend"><span>' + pd + ' / ' + pt.length + ' bounties</span><span>' + pct + '%</span></div></div>';
    }).join("") + '</div>';
  }

  function render() {
    renderHeader();
    if (currentView === "bounties") renderBounties();
    else if (currentView === "ideas") renderIdeas();
    else renderRoadmap();
  }

  function claim(id, e) {
    var t = getItem("task", id); if (!t || t.done) return;
    var before = rankFor(state.xp);
    t.done = true; t.at = Date.now();
    var xp = DIFF[t.diff] || 100; state.xp += xp;
    var after = rankFor(state.xp);
    var card = document.getElementById("card_" + id); if (card) card.classList.add("claimed-anim");
    var rect = (e && e.target) ? e.target.getBoundingClientRect() : { left: window.innerWidth / 2, top: 200, width: 0 };
    fxAt(rect.left + rect.width / 2 - 20, rect.top - 6, "+" + xp); chime(); save();
    setTimeout(function () { render(); if (after > before) levelUp(after); }, 620);
  }
  function undoClaim(id) {
    var t = getItem("task", id); if (!t || !t.done) return;
    t.done = false; t.at = null; state.xp = Math.max(0, state.xp - (DIFF[t.diff] || 100));
    save(); render(); toast("Bounty reopened.");
  }
  function levelUp(idx) {
    document.getElementById("luRank").textContent = RANKS[idx].name;
    document.getElementById("luSub").textContent = "Level " + (idx + 1) + " reached";
    document.getElementById("modalBg").classList.add("show"); fanfare();
  }
  function addTask() {
    var ti = document.getElementById("ntTitle"), v = ti.value.trim(); if (!v) return;
    var diffRaw = document.getElementById("ntDiff").value.split(" · ")[0];
    state.tasks.push({ id: "t_" + Date.now(), title: v, desc: "", phase: +document.getElementById("ntPhase").value, cat: document.getElementById("ntCat").value, diff: diffRaw, done: false, at: null, comments: [], images: [] });
    save(); renderBounties(); renderHeader();
  }
  function delTask(id) { state.tasks = state.tasks.filter(function (t) { return t.id !== id; }); delete openIds[id]; save(); renderBounties(); renderHeader(); }
  function addIdea() {
    var inp = document.getElementById("ideaInp"), v = inp.value.trim(); if (!v) return;
    state.ideas.push({ id: "i_" + Date.now(), txt: v, at: Date.now(), comments: [], images: [] });
    save(); renderIdeas(); renderHeader();
  }
  function promote(id) {
    var idea = getItem("idea", id); if (!idea) return;
    state.tasks.push({ id: "t_" + Date.now(), title: idea.txt, desc: "Promoted from an idea.", phase: stats().curPhase, cat: "BRAND", diff: "Medium", done: false, at: null, comments: idea.comments || [], images: idea.images || [] });
    state.ideas = state.ideas.filter(function (x) { return x.id !== id; });
    save(); currentView = "bounties"; setTab(); render();
  }
  function addComment(kind, id, txt) {
    txt = (txt || "").trim(); if (!txt) return;
    var it = getItem(kind, id); if (!it) return;
    it.comments = it.comments || []; it.comments.push({ txt: txt, at: Date.now() });
    save(); render();
  }

  function processFile(file, cb) {
    if (!file || !/^image\//.test(file.type)) { toast("That doesn't look like an image."); return; }
    var img = new Image(), url = URL.createObjectURL(file);
    img.onload = function () {
      var max = 760, w = img.width, h = img.height;
      if (Math.max(w, h) > max) { if (w >= h) { h = Math.round(h * max / w); w = max; } else { w = Math.round(w * max / h); h = max; } }
      var c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h); URL.revokeObjectURL(url);
      try { cb(c.toDataURL("image/jpeg", 0.72)); } catch (err) { cb(c.toDataURL()); }
    };
    img.onerror = function () { URL.revokeObjectURL(url); toast("Couldn't read that image."); };
    img.src = url;
  }
  function showLight(src) { document.getElementById("lightImg").src = src; document.getElementById("lightBg").classList.add("show"); }

  function attachImages(target, files) {
    if (!target) { toast("Open a bounty or idea first, then drop the image on it."); return; }
    var imgs = (files || []).filter(function (f) { return /^image\//.test(f.type); });
    if (!imgs.length) { if (files && files.length) toast("That doesn't look like an image."); return; }
    var p = target.split(":"), it = getItem(p[0], p[1]); if (!it) return;
    it.images = it.images || [];
    var remaining = imgs.length;
    imgs.forEach(function (f) {
      processFile(f, function (durl) {
        it.images.push(durl);
        remaining--;
        if (remaining === 0) { save(); render(); }
      });
    });
  }

  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }
  function timeAgo(ts) {
    var d = Math.floor((Date.now() - ts) / 1000);
    if (d < 60) return "just now"; if (d < 3600) return Math.floor(d / 60) + "m ago";
    if (d < 86400) return Math.floor(d / 3600) + "h ago"; return Math.floor(d / 86400) + "d ago";
  }
  function setTab() { document.querySelectorAll(".tab").forEach(function (t) { t.classList.toggle("on", t.getAttribute("data-view") === currentView); }); }
  function applyTheme() {
    if (theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
    var tt = document.getElementById("themeToggle");
    if (tt) tt.textContent = "THEME: " + (theme === "dark" ? "DARK" : "LIGHT");
  }

  (async function () {
    await load();
    document.querySelectorAll(".tab").forEach(function (t) { t.onclick = function () { currentView = t.getAttribute("data-view"); setTab(); render(); }; });
    var titleEl = document.getElementById("projTitle");
    titleEl.addEventListener("blur", function () { var v = titleEl.textContent.trim() || "VOLUME"; titleEl.textContent = v; state.name = v; save(); });
    titleEl.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); titleEl.blur(); } });
    document.getElementById("luClose").onclick = function () { document.getElementById("modalBg").classList.remove("show"); };
    document.getElementById("modalBg").onclick = function (e) { if (e.target.id === "modalBg") document.getElementById("modalBg").classList.remove("show"); };
    document.getElementById("lightBg").onclick = function () { this.classList.remove("show"); };
    document.getElementById("filePick").onchange = function () {
      var files = this.files ? Array.prototype.slice.call(this.files) : [], target = window._imgTarget; this.value = "";
      if (!files.length || !target) return;
      attachImages(target, files);
    };
    document.addEventListener("paste", function (e) {
      var items = (e.clipboardData && e.clipboardData.items) || [];
      var files = [];
      for (var i = 0; i < items.length; i++) { if (items[i].kind === "file" && /^image\//.test(items[i].type)) { var f = items[i].getAsFile(); if (f) files.push(f); } }
      if (!files.length) return;
      var active = document.activeElement && document.activeElement.closest(".detail");
      var target = active ? active.getAttribute("data-item") : lastActiveItem;
      if (!target) { toast("Open a bounty or idea first, then paste the image."); return; }
      e.preventDefault();
      attachImages(target, files);
    });
    var st = document.getElementById("soundToggle");
    st.textContent = "SOUND: " + (soundOn ? "ON" : "OFF");
    st.onclick = function () { soundOn = !soundOn; st.textContent = "SOUND: " + (soundOn ? "ON" : "OFF"); save(); if (soundOn) chime(); };
    var tt = document.getElementById("themeToggle");
    tt.onclick = function () { theme = theme === "dark" ? "light" : "dark"; applyTheme(); save(); };
    applyTheme();

    document.getElementById("exportBtn").onclick = function () {
      var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      var a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = (state.name || "project").toLowerCase() + "-backup.json"; a.click();
      setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
      toast("Backup downloaded.");
    };
    document.getElementById("importBtn").onclick = function () { document.getElementById("importPick").click(); };
    document.getElementById("importPick").onchange = function () {
      var f = this.files && this.files[0]; this.value = "";
      if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        try {
          var obj = JSON.parse(rd.result);
          if (!obj || !obj.tasks || !obj.ideas) throw 0;
          state = obj;
          state.tasks.forEach(function (t) { if (!t.comments) t.comments = []; if (!t.images) t.images = []; });
          state.ideas.forEach(function (i) { if (!i.comments) i.comments = []; if (!i.images) i.images = []; });
          soundOn = typeof state.sound === "boolean" ? state.sound : true;
          st.textContent = "SOUND: " + (soundOn ? "ON" : "OFF");
          theme = state.theme === "dark" ? "dark" : "light";
          applyTheme();
          save(); render(); toast("Project restored.");
        } catch (e) { toast("That file isn't a valid backup."); }
      };
      rd.readAsText(f);
    };

    render();
  })();
})();
</script>
</body>
</html>
